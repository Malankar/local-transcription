appId: com.local-transcription.app
productName: LocalTranscribe
asar: true
files:
  - out/**/*
  - package.json
asarUnpack:
  - "node_modules/nodejs-whisper/**"
  - "**/*.node"
linux:
  target: AppImage
directories:
  buildResources: build
extraResources:
  - from: build/tray-icon.png
    to: tray-icon.png
